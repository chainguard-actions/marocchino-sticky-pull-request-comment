name: Test message with number, owner, and repo inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with message, number, owner, and repo inputs
        id: action
        uses: .
        with:
          message: "Test comment from act workflow"
          number: "42"
          owner: "marocchino"
          repo: "sticky-pull-request-comment"
          GITHUB_TOKEN: "fake-token-for-testing"
        continue-on-error: true
      - name: Assert action attempted to run with message, number, owner, and repo
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action will fail because the token is fake and the PR doesn't exist,
          # but it should fail due to API error (not due to missing/invalid inputs).
          # We verify it ran (not skipped) and reached the API call stage.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was unexpectedly skipped"
            exit 1
          fi
          echo "PASS: action ran with message, number, owner, and repo inputs (API error expected with fake token)"
