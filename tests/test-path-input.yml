name: Test path input (comment from file)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create comment file
        run: |
          echo "Hello from file-based sticky PR comment" > /tmp/comment.md
      - id: action
        uses: .
        continue-on-error: true
        with:
          path: /tmp/comment.md
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action ran (path input covered)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to no real PR context in act,
          # but we verify the step was invoked with the path input.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: path input was accepted by the action"
