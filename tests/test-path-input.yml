name: Test path input for file-based message
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create comment file
        run: |
          echo "This is a sticky PR comment from a file" > /tmp/comment.md
      - id: action
        uses: .
        with:
          path: "/tmp/comment.md"
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with path input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to no real PR in act environment,
          # but we verify it was invoked with the path input
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action was invoked with path input"
          else
            echo "FAIL: action did not run"
            exit 1
          fi
