name: Test number_force input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: workflow_dispatch
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          message: "Sticky comment forced to PR number"
          number_force: "99"
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with number_force input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to no real PR in act environment,
          # but we verify it was invoked with the number_force input
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action was invoked with number_force input"
          else
            echo "FAIL: action did not run"
            exit 1
          fi
