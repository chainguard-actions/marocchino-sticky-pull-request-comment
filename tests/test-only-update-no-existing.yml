name: Test only_update with no existing comment does nothing
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          message: "This comment should NOT be created because only_update is true and no prior comment exists."
          only_update: "true"
          # No number_force is provided — the action exits early at the
          # "no pull request numbers given" check without making any API calls.
          # This safely verifies no comment is created.
      - name: Assert no comment was created
        env:
          CREATED: ${{ steps.action.outputs.created_comment_id }}
          PREVIOUS: ${{ steps.action.outputs.previous_comment_id }}
        run: |
          echo "created_comment_id: '$CREATED'"
          echo "previous_comment_id: '$PREVIOUS'"
          # only_update=true and no PR number: action exits early, no comment created
          if [ -n "$CREATED" ]; then
            echo "FAIL: expected no created_comment_id but got: $CREATED"
            exit 1
          fi
          echo "PASS: no comment created when only_update=true and no prior comment"
