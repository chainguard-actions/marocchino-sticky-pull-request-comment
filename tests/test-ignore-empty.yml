name: Test ignore_empty with no message
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with ignore_empty and no message
        id: action
        uses: .
        with:
          ignore_empty: "true"
          number_force: "1"
          GITHUB_TOKEN: "fake-token-for-testing"
        continue-on-error: true
      - name: Assert action did not fail due to missing message
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With ignore_empty=true and no message, the action should succeed
          # (it skips posting when there's nothing to post)
          if [ "$OUTCOME" = "failure" ]; then
            echo "FAIL: action failed unexpectedly with ignore_empty=true and no message"
            exit 1
          fi
          echo "PASS: action handled empty message gracefully"
