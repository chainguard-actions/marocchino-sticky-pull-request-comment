name: Test owner and repo inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Test comment for owner and repo inputs"
          number_force: "1"
          owner: "octocat"
          repo: "Hello-World"
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action ran (API call may fail in local env)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: owner and repo inputs were accepted"
