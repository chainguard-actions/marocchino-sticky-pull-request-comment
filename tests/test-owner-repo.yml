name: Test owner and repo inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          message: "Sticky comment targeting specific owner and repo"
          owner: "octocat"
          repo: "hello-world"
          number_force: "1"
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with owner and repo inputs
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to no real PR or permissions in act environment,
          # but we verify it was invoked with the owner and repo inputs
          if [ "${{ steps.action.outcome }}" = "success" ] || [ "${{ steps.action.outcome }}" = "failure" ]; then
            echo "PASS: action was invoked with owner and repo inputs"
          else
            echo "FAIL: action did not run"
            exit 1
          fi
