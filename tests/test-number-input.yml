name: Test number input (PR number for push event)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Comment via push event with PR number"
          number: "42"
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action ran (number input covered)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action may fail due to no real PR #42 in act environment,
          # but we verify the step was invoked with the number input.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: number input was accepted by the action"
