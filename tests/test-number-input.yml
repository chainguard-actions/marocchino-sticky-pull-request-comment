name: Test number input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          message: "Test comment for PR number input"
          number: "42"
          GITHUB_TOKEN: ${{ github.token }}
      - name: Assert action ran (API call may fail in local env)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: number input was accepted"
